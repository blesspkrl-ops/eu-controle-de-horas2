<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard de Serviço & Saldo</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --danger: #f43f5e;
            --danger-hover: #e11d48;
            --success: #34d399;
            --border: #334155;
        }

        html, body {
            background-color: var(--bg-color);
            -webkit-text-size-adjust: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 15px 10px; 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 20px 15px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        .tabs { 
            display: flex; 
            gap: 5px;
            border-bottom: 2px solid var(--border); 
            margin-bottom: 20px; 
        }

        .tab-btn { 
            flex: 1;
            padding: 12px 10px; 
            border: none; 
            background: none; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: 600; 
            color: var(--text-muted); 
            transition: all 0.2s ease;
            border-radius: 6px 6px 0 0;
            text-align: center;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active { 
            color: var(--primary); 
            border-bottom: 3px solid var(--primary); 
            background-color: rgba(56, 189, 248, 0.1);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { font-size: 20px; margin-top: 0; margin-bottom: 15px; color: var(--text-main); }
        h3 { font-size: 15px; margin-top: 25px; color: var(--text-muted); font-weight: normal; }

        .form-row {
            display: flex;
            gap: 12px;
            flex-direction: column; 
            margin-bottom: 15px;
        }

        @media (min-width: 600px) {
            .form-row { flex-direction: row; }
        }

        .form-group { 
            flex: 1;
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 13px;
            color: var(--text-muted); 
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--bg-color);
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            color: var(--text-main);
            font-size: 16px; 
            transition: border 0.2s;
            -webkit-appearance: none; 
            appearance: none;
        }

        input[type="date"] {
            color-scheme: dark; 
            min-height: 45px;
        }

        .periodo-inputs {
            display: flex;
            gap: 8px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button { 
            background-color: var(--primary); 
            color: #0f172a; 
            padding: 12px 18px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: bold; 
            -webkit-appearance: none;
            appearance: none;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover { background-color: var(--primary-hover); }
        
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: var(--danger-hover); }

        .resumo-mes-box {
            display: flex;
            justify-content: space-between;
            background: rgba(56, 189, 248, 0.06);
            border: 1px dashed var(--primary);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }
        .resumo-item span {
            font-weight: bold;
            color: var(--primary);
        }

        .saldo-box { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-size: 16px; 
            border-left: 5px solid var(--danger);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        @media (min-width: 400px) {
            .saldo-box { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .saldo-valor {
            font-size: 26px;
            font-weight: 800;
            color: var(--danger);
        }

        .table-responsive {
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background-color: rgba(0,0,0,0.1);
            table-layout: fixed; 
        }

        th, td { 
            padding: 12px 10px; 
            text-align: left; 
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        th { 
            background-color: rgba(0, 0, 0, 0.3); 
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr.clicavel {
            cursor: pointer;
            -webkit-user-select: none; 
            user-select: none;
        }

        tr.clicavel:active {
            background-color: rgba(244, 63, 94, 0.15); 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('carga-horaria')">⏱️ Horas</button>
        <button class="tab-btn" onclick="switchTab('salario-saldo')">💰 Salário</button>
    </div>

    <!-- ABA 1: CARGA HORÁRIA -->
    <div id="carga-horaria" class="tab-content active">
        <h2>Horas de Serviço</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Data:</label>
                <input type="date" id="data">
            </div>
            <div class="form-group">
                <label>Horas:</label>
                <input type="number" id="horas" inputmode="decimal" step="0.1" placeholder="Ex: 8 ou 5.5">
            </div>
            <div class="form-group">
                <label>Período:</label>
                <div class="periodo-inputs">
                    <select id="filtroMes" onchange="atualizarTelas()">
                        <option value="01">Jan</option>
                        <option value="02">Fev</option>
                        <option value="03">Mar</option>
                        <option value="04">Abr</option>
                        <option value="05">Mai</option>
                        <option value="06">Jun</option>
                        <option value="07">Jul</option>
                        <option value="08">Ago</option>
                        <option value="09">Set</option>
                        <option value="10">Out</option>
                        <option value="11">Nov</option>
                        <option value="12">Dez</option>
                    </select>
                    <select id="filtroAno" onchange="atualizarTelas()">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="btn-group">
            <button onclick="lancarHoras()" style="flex: 1;">➕ Lançar</button>
            <button class="btn-danger" onclick="fecharMes()" style="flex: 1;">🔒 Fechar Mês</button>
        </div>

        <div class="resumo-mes-box">
            <div class="resumo-item">Horas Totais: <span id="resumoHoras">0h</span></div>
            <div class="resumo-item">Valor Total: <span id="resumoValor">R$ 0,00</span></div>
        </div>

        <h3>📅 Histórico</h3>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40%;">Data</th>
                        <th style="width: 30%;">Horas</th>
                        <th style="width: 30%;">Total</th>
                    </tr>
                </thead>
                <tbody id="tabelaHoras"></tbody>
            </table>
        </div>
    </div>

    <!-- ABA 2: SALÁRIO E SALDO -->
    <div id="salario-saldo" class="tab-content">
        <h2>Controle de Salário</h2>
        <div class="saldo-box">
            <span>Sensaçao te deve:</span>
            <span id="saldoTotal" class="saldo-valor">R$ 0,00</span>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Pagamento Recebido (R$):</label>
                <input type="number" id="valorPago" inputmode="decimal" step="0.01" placeholder="Quanto você recebeu">
            </div>
            <button onclick="registrarPagamento()" style="width: 100%;">💸 Confirmar</button>
        </div>

        <h3>📊 Extrato</h3>
        <div class="table-responsive">
            <table>
                <thead>
                    <!-- ALTERADO: Ajuste de proporção para dar espaço máximo ao Valor -->
                    <tr>
                        <th style="width: 20%;">Data</th>
                        <th style="width: 45%;">Descrição</th>
                        <th style="width: 35%;">Valor</th>
                    </tr>
                </thead>
                <tbody id="tabelaSaldo"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
